<div id="enb-root"></div>

<style>
  :root{
    --bg:#f7f4ee;
    --card:#fffdfa;
    --line:#e6dfd2;
    --text:#2a241b;
    --muted:#6e665b;
    --point:#7a4b1f;
    --point-soft:#f0e3d2;
    --green:#2e6b4f;
    --red:#9b3d2f;
    --amber:#a56b00;
    --blue:#245b8f;
    --shadow:0 10px 28px rgba(42,36,27,.08);
  }

  #enb-root{
    font-family:"Pretendard","Noto Sans KR",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    line-height:1.65;
  }

  #enb-root *{box-sizing:border-box}

  .enb-wrap{
    max-width:1100px;
    margin:0 auto;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:28px;
    padding:28px;
    box-shadow:var(--shadow);
  }

  .enb-header{
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:flex-start;
    flex-wrap:wrap;
    margin-bottom:22px;
  }

  .enb-title{
    margin:0;
    font-size:30px;
    font-weight:800;
    letter-spacing:-0.03em;
  }

  .enb-sub{
    margin-top:8px;
    color:var(--muted);
    font-size:14px;
  }

  .enb-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--point);
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
  }

  .enb-hero{
    background:linear-gradient(135deg,#fffdf8 0%,#f5ede1 100%);
    border:1px solid var(--line);
    border-radius:24px;
    padding:22px;
    margin-bottom:18px;
  }

  .enb-label{
    display:inline-block;
    font-size:12px;
    font-weight:800;
    color:var(--point);
    background:var(--point-soft);
    border-radius:999px;
    padding:6px 10px;
    margin-bottom:10px;
  }

  .enb-one{
    margin:0;
    font-size:22px;
    font-weight:800;
    line-height:1.5;
    letter-spacing:-0.02em;
  }

  .enb-market{
    margin-top:14px;
    display:grid;
    grid-template-columns:1.2fr 1fr 1fr;
    gap:14px;
  }

  .enb-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
  }

  .enb-box h4{
    margin:0 0 8px;
    font-size:14px;
    font-weight:800;
    color:var(--point);
  }

  .enb-box p,
  .enb-box li{
    margin:0;
    color:var(--text);
    font-size:14px;
  }

  .enb-box ul{
    margin:0;
    padding-left:18px;
  }

  .enb-overview{
    display:grid;
    grid-template-columns:1.3fr 1fr;
    gap:14px;
    margin:18px 0 26px;
  }

  .enb-overview-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
  }

  .enb-overview-card h3{
    margin:0 0 10px;
    font-size:16px;
    font-weight:800;
    color:var(--point);
  }

  .enb-overview-card p{
    margin:0;
    font-size:14px;
  }

  .enb-feature-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .enb-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:7px 10px;
    border-radius:999px;
    background:#fff;
    border:1px solid var(--line);
    font-size:12px;
    color:var(--muted);
    font-weight:700;
  }

  .enb-grid{
    display:grid;
    grid-template-columns:repeat(5,minmax(0,1fr));
    gap:14px;
    margin:18px 0 26px;
  }

  .enb-brief{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
    min-height:160px;
  }

  .enb-brief h3{
    margin:0 0 10px;
    font-size:16px;
    font-weight:800;
    color:var(--point);
  }

  .enb-brief p{
    margin:0;
    font-size:14px;
    color:var(--text);
  }

  .enb-sec-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin:28px 0 14px;
  }

  .enb-sec-title h2{
    margin:0;
    font-size:24px;
    font-weight:800;
    letter-spacing:-0.03em;
  }

  .enb-news-list{
    display:grid;
    gap:16px;
  }

  .enb-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:20px;
  }

  .enb-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
    margin-bottom:12px;
  }

  .enb-rank{
    width:42px;
    height:42px;
    border-radius:14px;
    background:var(--point);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:900;
    flex:0 0 auto;
  }

  .enb-title-wrap{
    flex:1 1 auto;
    min-width:0;
  }

  .enb-news-title{
    margin:4px 0 8px;
    font-size:20px;
    font-weight:800;
    line-height:1.45;
    letter-spacing:-0.02em;
  }

  .enb-meta{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:10px;
  }

  .enb-badge{
    display:inline-flex;
    align-items:center;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    border:1px solid var(--line);
    background:#fff;
    color:var(--muted);
  }

  .badge-cat{color:var(--blue); background:#eef5fb; border-color:#d4e5f5;}
  .badge-good{color:var(--green); background:#edf7f1; border-color:#cfe7d8;}
  .badge-mid{color:var(--amber); background:#fff6e6; border-color:#f2dfb4;}
  .badge-bad{color:var(--red); background:#fbefed; border-color:#ebd0ca;}

  .enb-summary{
    margin:0;
    padding-left:18px;
  }

  .enb-summary li{
    margin:0 0 6px;
    font-size:15px;
    color:var(--text);
  }

  .enb-split{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:14px;
  }

  .enb-mini{
    background:#fff;
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
  }

  .enb-mini h5{
    margin:0 0 8px;
    font-size:13px;
    color:var(--point);
    font-weight:800;
  }

  .enb-mini p{
    margin:0;
    font-size:14px;
  }

  .enb-keywords,
  .enb-stocks{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }

  .enb-link{
    display:inline-block;
    margin-top:12px;
    color:var(--point);
    text-decoration:none;
    font-weight:800;
  }

  .enb-link:hover{text-decoration:underline}

  .enb-watchlist{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:16px;
  }

  .enb-watch{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:18px;
  }

  .enb-watch h3{
    margin:0 0 6px;
    font-size:20px;
    font-weight:800;
  }

  .enb-watch .sector{
    color:var(--muted);
    font-size:13px;
    margin-bottom:10px;
  }

  .enb-watch p{
    margin:0 0 10px;
    font-size:14px;
  }

  .enb-footer{
    margin-top:24px;
    padding-top:16px;
    border-top:1px dashed var(--line);
    color:var(--muted);
    font-size:13px;
  }

  .enb-loading,
  .enb-error{
    border:1px solid var(--line);
    background:#fff;
    border-radius:18px;
    padding:22px;
    text-align:center;
    color:var(--muted);
  }

  .enb-stars{
    letter-spacing:2px;
    color:#c28b2f;
    font-size:15px;
    font-weight:900;
  }

  @media (max-width:980px){
    .enb-market,
    .enb-overview,
    .enb-grid,
    .enb-watchlist,
    .enb-split{
      grid-template-columns:1fr;
    }
  }

  @media (max-width:640px){
    .enb-wrap{padding:18px}
    .enb-title{font-size:24px}
    .enb-one{font-size:18px}
    .enb-news-title{font-size:18px}
    .enb-top{align-items:flex-start}
  }
</style>

<script>
(function () {
  const DATA_URL = "https://jediydc-cloud.github.io/Economic_News/data.json";

  const root = document.getElementById("enb-root");
  if (!root) return;

  const BAD_TEXT_PATTERNS = [
    "[번역 필요]",
    "[번역 대기]",
    "자동 fallback",
    "fallback",
    "분석 대기",
    "요약 대기",
    "요약 생성 실패"
  ];

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function cleanText(value) {
    let text = String(value ?? "").trim();
    BAD_TEXT_PATTERNS.forEach(pattern => {
      text = text.replaceAll(pattern, "");
    });
    text = text.replace(/\s+/g, " ").trim();
    return text;
  }

  function safeText(value, fallback = "-") {
    const cleaned = cleanText(value);
    return cleaned ? cleaned : fallback;
  }

  function safeArray(value) {
    if (Array.isArray(value)) return value;
    if (typeof value === "string" && value.trim()) return [value.trim()];
    return [];
  }

  function renderStars(score) {
    const n = Math.max(0, Math.min(5, Number(score || 0)));
    return "★".repeat(n) + "☆".repeat(5 - n);
  }

  function badgeClassByView(view) {
    const v = safeText(view, "").toLowerCase();
    if (v.includes("긍정") || v.includes("관심")) return "badge-good";
    if (v.includes("중립")) return "badge-mid";
    if (v.includes("주의") || v.includes("경계") || v.includes("부정")) return "badge-bad";
    return "badge-mid";
  }

  function badgeClassByImpact(impact) {
    const v = safeText(impact, "").toLowerCase();
    if (v.includes("긍정")) return "badge-good";
    if (v.includes("부정")) return "badge-bad";
    return "badge-mid";
  }

  function renderSummary(summary, fallbackText) {
    const items = safeArray(summary)
      .map(v => safeText(v, ""))
      .filter(Boolean)
      .slice(0, 3);

    if (!items.length) {
      const fb = safeText(fallbackText, "");
      if (!fb) return "<li>요약 정보가 아직 없습니다.</li>";
      return `<li>${escapeHtml(fb)}</li>`;
    }

    return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
  }

  function getBriefCards(brief) {
    if (!brief || typeof brief !== "object") return [];
    return [
      { title: "국내 거시경제", summary: brief["국내거시경제"] },
      { title: "글로벌 경제", summary: brief["글로벌경제"] },
      { title: "증시·금리", summary: brief["증시금리"] },
      { title: "부동산·정책", summary: brief["부동산정책"] },
      { title: "기업·산업", summary: brief["기업산업"] }
    ].filter(item => cleanText(item.summary));
  }

  function renderProjectOverview(overview) {
    if (!overview || typeof overview !== "object") return "";

    const features = safeArray(overview.main_features).map(v => safeText(v, "")).filter(Boolean);

    return `
      <div class="enb-overview">
        <div class="enb-overview-card">
          <h3>브리프 소개</h3>
          <p>${escapeHtml(safeText(overview.purpose, "경제 뉴스와 투자 시사점을 자동으로 정리하는 브리프입니다."))}</p>
        </div>
        <div class="enb-overview-card">
          <h3>핵심 기능</h3>
          <div class="enb-feature-list">
            ${features.length ? features.map(v => `<span class="enb-chip">${escapeHtml(v)}</span>`).join("") : `<span class="enb-chip">경제 뉴스 자동 수집</span>`}
          </div>
        </div>
      </div>
    `;
  }

  function renderBriefSections(brief) {
    const items = getBriefCards(brief);
    if (!items.length) return "";

    return `
      <div class="enb-sec-title">
        <h2>오늘의 핵심 브리프</h2>
      </div>
      <div class="enb-grid">
        ${items.map(item => `
          <div class="enb-brief">
            <h3>${escapeHtml(safeText(item.title, "브리프"))}</h3>
            <p>${escapeHtml(safeText(item.summary, "-"))}</p>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderNews(list) {
    const items = Array.isArray(list) ? list : [];
    if (!items.length) {
      return `<div class="enb-error">표시할 주요 뉴스가 없습니다.</div>`;
    }

    return `
      <div class="enb-sec-title">
        <h2>오늘의 주요 뉴스 TOP ${items.length}</h2>
      </div>
      <div class="enb-news-list">
        ${items.map(item => {
          const title = safeText(item.display_title || item.title, "제목 없음");
          const category = safeText(item.category || item.classification, "경제");
          const stance = safeText(item.investment_view || item.stance, "중립");
          const impact = safeText(item.market_impact || item.investment_impact, "중립");
          const reason = safeText(item.investment_reason || item.investment_impact, "-");
          const keySignal = safeText(item.key_signal, "-");
          const sector = safeText(item.related_sector, "-");
          const keywords = safeArray(item.keywords).map(k => safeText(k, "")).filter(Boolean);
          const stocks = safeArray(item.related_stocks).map(s => safeText(s, "")).filter(Boolean);
          const sourceUrl = safeText(item.source_url || item.link, "");
          const publishedAt = safeText(item.published_at || item.published, "-");
          const source = safeText(item.source, "원문");
          const importanceScore = Number(item.importance_score || item.importance || 0);
          const region = safeText(item.region, "");

          return `
            <article class="enb-card">
              <div class="enb-top">
                <div class="enb-rank">${escapeHtml(item.rank ?? "-")}</div>
                <div class="enb-title-wrap">
                  <div class="enb-meta">
                    <span class="enb-badge badge-cat">${escapeHtml(category)}</span>
                    ${region ? `<span class="enb-badge">${escapeHtml(region)}</span>` : ""}
                    <span class="enb-badge ${badgeClassByView(stance)}">${escapeHtml(stance)}</span>
                    <span class="enb-badge ${badgeClassByImpact(impact)}">${escapeHtml(impact)}</span>
                    <span class="enb-badge">중요도 <span class="enb-stars">${escapeHtml(renderStars(importanceScore))}</span></span>
                    <span class="enb-badge">${escapeHtml(publishedAt)}</span>
                  </div>
                  <h3 class="enb-news-title">${escapeHtml(title)}</h3>
                </div>
              </div>

              <ol class="enb-summary">
                ${renderSummary(item.summary, item.summary_text || item.description)}
              </ol>

              <div class="enb-split">
                <div class="enb-mini">
                  <h5>투자 해석</h5>
                  <p>${escapeHtml(reason)}</p>
                </div>
                <div class="enb-mini">
                  <h5>핵심 시그널</h5>
                  <p>${escapeHtml(keySignal)}</p>
                </div>
              </div>

              <div class="enb-split">
                <div class="enb-mini">
                  <h5>관련 섹터</h5>
                  <p>${escapeHtml(sector)}</p>
                </div>
                <div class="enb-mini">
                  <h5>원문 출처</h5>
                  <p>${escapeHtml(source)}</p>
                </div>
              </div>

              ${keywords.length ? `
                <div class="enb-keywords">
                  ${keywords.map(k => `<span class="enb-chip"># ${escapeHtml(k)}</span>`).join("")}
                </div>
              ` : ""}

              ${stocks.length ? `
                <div class="enb-stocks">
                  ${stocks.map(s => `<span class="enb-chip">관련 종목 · ${escapeHtml(s)}</span>`).join("")}
                </div>
              ` : ""}

              ${sourceUrl ? `<a class="enb-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener noreferrer">원문 보기 · ${escapeHtml(source)}</a>` : ""}
            </article>
          `;
        }).join("")}
      </div>
    `;
  }

  function renderWatchlist(list) {
    const items = Array.isArray(list) ? list : [];
    if (!items.length) return "";

    return `
      <div class="enb-sec-title">
        <h2>오늘의 관심 종목</h2>
      </div>
      <div class="enb-watchlist">
        ${items.map(item => `
          <article class="enb-watch">
            <div class="enb-meta">
              <span class="enb-badge ${badgeClassByView(item.view)}">${escapeHtml(safeText(item.view, "중립"))}</span>
            </div>
            <h3>${escapeHtml(safeText(item.name, "종목명"))}</h3>
            <div class="sector">${escapeHtml(safeText(item.sector, "-"))}</div>
            <p><strong>이유</strong><br>${escapeHtml(safeText(item.reason, "-"))}</p>
            <p><strong>리스크</strong><br>${escapeHtml(safeText(item.risk, "-"))}</p>
          </article>
        `).join("")}
      </div>
    `;
  }

  function renderView(data) {
    const overview = data.project_overview || {};
    const brief = data.brief || {};
    const oneLiner = safeText(
      data.one_liner || brief["오늘의한줄"],
      "오늘의 핵심 요약이 아직 준비되지 않았습니다."
    );
    const totalComment = safeText(
      brief["총평"],
      "오늘 시장 총평이 아직 준비되지 않았습니다."
    );
    const implication = safeText(
      brief["오늘의투자시사점"],
      "오늘의 투자 시사점이 아직 준비되지 않았습니다."
    );

    root.innerHTML = `
      <section class="enb-wrap">
        <header class="enb-header">
          <div>
            <h1 class="enb-title">${escapeHtml(safeText(overview.project_name, "경제 뉴스 브리프"))}</h1>
            <div class="enb-sub">
              ${escapeHtml(safeText(data.analysis_date, "-"))} 기준 · ${escapeHtml(safeText(data.generated_at, "-"))} 생성
            </div>
          </div>
          <div class="enb-pill">매일 아침 시장의 결을 정리하는 자동 브리프</div>
        </header>

        <section class="enb-hero">
          <div class="enb-label">오늘의 한 줄</div>
          <p class="enb-one">${escapeHtml(oneLiner)}</p>

          <div class="enb-market">
            <div class="enb-box">
              <h4>오늘의 총평</h4>
              <p>${escapeHtml(totalComment)}</p>
            </div>
            <div class="enb-box">
              <h4>투자 시사점</h4>
              <p>${escapeHtml(implication)}</p>
            </div>
            <div class="enb-box">
              <h4>운영 정보</h4>
              <ul>
                <li>기준일: ${escapeHtml(safeText(data.analysis_date, "-"))}</li>
                <li>생성시각: ${escapeHtml(safeText(data.generated_at, "-"))}</li>
                <li>출력물: ${escapeHtml(safeText(overview.final_deliverable, "data.json"))}</li>
              </ul>
            </div>
          </div>
        </section>

        ${renderProjectOverview(overview)}
        ${renderBriefSections(brief)}
        ${renderNews(data.top_news)}
        ${renderWatchlist(data.watchlist)}

        <footer class="enb-footer">
          <div>${escapeHtml(safeText(data.disclaimer, "본 자료는 정보 제공용이며 특정 종목의 매수·매도 추천이 아닙니다."))}</div>
        </footer>
      </section>
    `;
  }

  async function init() {
    root.innerHTML = `<div class="enb-loading">경제 뉴스 브리프를 불러오는 중입니다…</div>`;

    try {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      const data = await res.json();
      renderView(data);
    } catch (err) {
      root.innerHTML = `
        <div class="enb-error">
          데이터를 불러오지 못했습니다.<br>
          잠시 후 다시 시도해 주세요.<br><br>
          <small>${escapeHtml(String(err && err.message ? err.message : err))}</small>
        </div>
      `;
    }
  }

  init();
})();
</script>
