name: 📈 Daily Economic News Brief

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run economic news brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: |
          python main.py

      - name: ✅ Verify output files
        run: |
          test -f docs/data.json
          echo "docs/data.json 생성 확인 완료"

      - name: 💾 Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/data.json

          if git diff --staged --quiet; then
            echo "변경 사항이 없어 커밋을 생략합니다."
            exit 0
          fi

          COMMIT_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          git commit -m "📈 Daily economic brief - ${COMMIT_TIME}"

          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin HEAD:"${GITHUB_REF_NAME}"
